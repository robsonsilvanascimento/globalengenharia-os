version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: os_whatsapp
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - '3333:3333'
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/os_whatsapp?schema=public
      REDIS_URL: redis://redis:6379
      STORAGE_DIR: /app/storage
    volumes:
      - ./backend:/app
      - /app/node_modules
      - storage_dev_data:/app/storage
    depends_on:
      - postgres
      - redis
    command: sh -c "npx prisma db push --skip-generate && npx prisma db seed && npm run dev"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/os_whatsapp?schema=public
      REDIS_URL: redis://redis:6379
      STORAGE_DIR: /app/storage
    volumes:
      - ./backend:/app
      - /app/node_modules
      - storage_dev_data:/app/storage
    depends_on:
      - postgres
      - redis
      - backend
    command: sh -c "npm run dev:worker"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_dev_data:
  storage_dev_data:
