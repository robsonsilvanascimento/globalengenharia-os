; Copie para inventory.ini (gitignored) e preencha com os dados reais da VPS.
; Nunca commite o inventory.ini de verdade — ele carrega IP e usuário reais.

[vps]
producao ansible_host=SEU_IP_VPS ansible_user=root

[vps:vars]
; Chave publica SSH usada pelo GitHub Actions pra logar como o usuario "deploy"
; depois de criado (ver docs/deploy-secrets.md). Cole o conteudo da chave .pub.
deploy_ssh_public_key="COLE_A_CHAVE_PUBLICA_AQUI"

; Dominios (usados so na etapa de SSL, tag "ssl")
app_domain=app.seudominio.com.br
api_domain=api.seudominio.com.br
letsencrypt_email=seu@email.com

; URL do repositorio a clonar
repo_url=https://github.com/SEU_ORG/SEU_REPO.git
